name: Web App CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web-ci.yml'
  push:
    branches:
      - main
      - staging

permissions:
  contents: read
  security-events: write  # Required for CodeQL uploads

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter web prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

      - name: Run ESLint
        run: pnpm --filter web lint
        continue-on-error: true  # Don't block on linting warnings

      - name: Type check
        run: pnpm --filter web type-check
        continue-on-error: true  # Don't block on type errors

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter web prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

      - name: Push Prisma Schema to Database
        run: cd apps/web && npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
        continue-on-error: false  # Must succeed for tests to run

      - name: Run tests
        run: pnpm --filter web test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    # Only run CodeQL on push to main/staging, not on PRs (permission restrictions)
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter web prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, typescript
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: true  # Allow failures due to permission restrictions

  env-validation:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for demo accounts in production
        run: |
          if grep -r "ENABLE_DEMO_ACCOUNTS.*true" apps/web/.env.production 2>/dev/null; then
            echo "❌ ERROR: Demo accounts enabled in production!"
            exit 1
          fi
          echo "✅ Demo accounts disabled"

      - name: Verify no secrets in code
        run: |
          # Check for actual API key patterns (sk-proj-, sk-ant-, not just "sk-" which matches words like "risk-")
          if grep -rE "sk-proj-[a-zA-Z0-9]{20,}|sk-ant-[a-zA-Z0-9]{20,}" apps/web/src/ 2>/dev/null | grep -v ".test." | grep -v ".spec."; then
            echo "❌ ERROR: Real API keys found in source code!"
            exit 1
          fi
          echo "✅ No secrets in code"

      - name: Check for NEXT_PUBLIC secrets
        run: |
          # Only check source code (apps/web/src/), exclude .env.example files
          # Also exclude empty strings like NEXT_PUBLIC_CARTESIA_API_KEY=""
          if grep -r "NEXT_PUBLIC.*API_KEY\|NEXT_PUBLIC.*SECRET\|NEXT_PUBLIC.*TOKEN" apps/web/src/ 2>/dev/null | grep -v '""' | grep -v "''"; then
            echo "❌ ERROR: Sensitive data exposed via NEXT_PUBLIC_* in source code"
            exit 1
          fi
          echo "✅ No sensitive NEXT_PUBLIC_* variables in source code"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security, env-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter web prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

      - name: Build application
        run: pnpm --filter web build
        env:
          NODE_ENV: production
          # Dummy DATABASE_URL for build (not actually used, just for validation)
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
          # Skip telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check build size
        run: |
          BUILD_SIZE=$(du -sh apps/web/.next | awk '{print $1}')
          echo "Build size: $BUILD_SIZE"
          echo "✅ Build completed successfully"
