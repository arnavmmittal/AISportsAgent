name: Web App CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web-ci.yml'
  push:
    branches:
      - main
      - staging

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter web lint

      - name: Type check
        run: pnpm --filter web type-check

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter web test
        env:
          NODE_ENV: test

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  env-validation:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for demo accounts in production
        run: |
          if grep -r "ENABLE_DEMO_ACCOUNTS.*true" apps/web/.env.production 2>/dev/null; then
            echo "❌ ERROR: Demo accounts enabled in production!"
            exit 1
          fi
          echo "✅ Demo accounts disabled"

      - name: Verify no secrets in code
        run: |
          if grep -r "sk-" apps/web/src/ 2>/dev/null | grep -v ".test." | grep -v ".spec."; then
            echo "❌ ERROR: API keys found in source code!"
            exit 1
          fi
          echo "✅ No secrets in code"

      - name: Check for NEXT_PUBLIC secrets
        run: |
          if grep -r "NEXT_PUBLIC.*API_KEY\|NEXT_PUBLIC.*SECRET\|NEXT_PUBLIC.*TOKEN" apps/web/ 2>/dev/null; then
            echo "❌ ERROR: Sensitive data exposed via NEXT_PUBLIC_*"
            exit 1
          fi
          echo "✅ No sensitive NEXT_PUBLIC_* variables"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, security, env-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm --filter web build
        env:
          NODE_ENV: production

      - name: Check build size
        run: |
          BUILD_SIZE=$(du -sh apps/web/.next | awk '{print $1}')
          echo "Build size: $BUILD_SIZE"
          echo "✅ Build completed successfully"
