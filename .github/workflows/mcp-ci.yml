name: MCP Server CI

on:
  pull_request:
    paths:
      - 'ai-sports-mcp/server/**'
      - 'infra/docker/mcp-server.Dockerfile'
      - '.github/workflows/mcp-ci.yml'
  push:
    branches:
      - main
      - staging

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ai-sports-mcp/server/requirements.txt'

      - name: Install dependencies
        run: |
          cd ai-sports-mcp/server
          pip install -r requirements.txt
          pip install black ruff mypy

      - name: Run Black format check
        run: |
          cd ai-sports-mcp/server
          black --check app/
        continue-on-error: true  # Don't block on formatting issues

      - name: Run Ruff linter
        run: |
          cd ai-sports-mcp/server
          ruff check app/
        continue-on-error: true  # Don't block on linting issues

      - name: Run mypy type check
        run: |
          cd ai-sports-mcp/server
          mypy app/ --ignore-missing-imports
        continue-on-error: true  # Don't block on type check issues

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ai-sports-mcp/server/requirements.txt'

      - name: Install dependencies
        run: |
          cd ai-sports-mcp/server
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: sk-test-key-for-ci-testing
          ENVIRONMENT: test
          DEBUG: true
        run: |
          cd ai-sports-mcp/server
          pytest tests/ --cov=app --cov-report=xml --cov-report=term
        continue-on-error: false  # Tests should pass

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./ai-sports-mcp/server/coverage.xml
          flags: mcp-server
        continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Run safety check
        run: |
          cd ai-sports-mcp/server
          safety check --file requirements.txt
        continue-on-error: true

      - name: Run Trivy security scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'ai-sports-mcp/server'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

  build-docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/mcp-server.Dockerfile
          push: false
          tags: |
            ai-sports-mcp:${{ github.sha }}
            ai-sports-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -f infra/docker/mcp-server.Dockerfile -t mcp-test .
          echo "✅ Docker image built successfully"

  env-validation:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Check for actual API key patterns (not just references to "sk-")
          if grep -rE "sk-proj-[a-zA-Z0-9]{20,}|sk-ant-[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{40,}" ai-sports-mcp/server/app/ 2>/dev/null; then
            echo "❌ ERROR: Real API keys found in source code!"
            exit 1
          fi
          echo "✅ No secrets in code"

      - name: Verify .env.example exists
        run: |
          if [ ! -f ai-sports-mcp/server/.env.example ]; then
            echo "⚠️  WARNING: .env.example not found"
            exit 0
          fi
          echo "✅ .env.example exists"

      - name: Check for demo account logic
        run: |
          if grep -r "demo-" ai-sports-mcp/server/app/ 2>/dev/null; then
            echo "⚠️  WARNING: Demo account logic found"
            exit 0
          fi
          echo "✅ No demo account logic"
